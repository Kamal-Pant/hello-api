name: Deploy Docker Container

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t kamalpant100/hello-api:latest .

      - name: Push image to DockerHub
        run: docker push kamalpant100/hello-api:latest

      - name: Build worker image
        run: docker build -t kamalpant100/hello-worker:latest ./worker

      - name: Push worker image
        run: docker push kamalpant100/hello-worker:latest


      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/hello-api
            docker compose pull
            docker compose down
            docker compose up -d
